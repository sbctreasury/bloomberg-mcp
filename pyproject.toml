[project]
name = "bloomberg-mcp"
version = "1.0.0"
description = "Self-documenting MCP server for Bloomberg Terminal data"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.0.0",
    "pydantic>=2.0.0",
    "psutil>=5.9.0",
    "matplotlib>=3.8.0",
    "altair>=5.0.0",
    "pandas>=2.0.0",
    "xbbg>=0.11.0",
    "polars-bloomberg>=0.5.0",
    "blpapi>=3.24.0",
]

[[tool.uv.index]]
name = "bloomberg"
url = "https://blpapi.bloomberg.com/repository/releases/python/simple/"
